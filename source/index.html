<!DOCTYPE html>
<html lang="ru" data-validate="html">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNTN</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="favicons/180.png">
    <link rel="manifest" href="manifest.webmanifest.json">

    <link rel="stylesheet" href="sass/style.scss">
  </head>

  <body class="page-body">

    <h1 class="visually-hidden">MNTN</h1>

    <div class="hero">

      <div class="hero__content">
        <nav class="nav">
          <a class="nav__logo" href="#">
            <svg class="logo"
              width="108"
              height="28"
              aria-hidden="true"
              focusable="false">
              <use href="/__spritemap#sprite-nav__logo"></use>
            </svg>
          </a>
          <ul class="nav__list">
            <li class="nav__item">
              <a class="nav__item-link" href="#">
                <span>Equipment</span>
              </a>
            </li>
            <li class="nav__item">
              <a class="nav__item-link" href="#">
                <span>About us</span>
              </a>
            </li>
            <li class="nav__item">
              <a class="nav__item-link" href="#">
                <span>Blog</span>
              </a>
            </li>
          </ul>
            
          <div class="nav__account">
            <a class="nav__account-link" href="#">
              <svg class="nav__account-icon"
                width="24"
                height="24"
                aria-hidden="true"
                focusable="false">
                <use href="/__spritemap#sprite-account"></use>
            </svg>
              <span>Account</span>
            </a>
          </div>
          
        </nav>

        <div class="hero__socials">
          <span>Follow us</span> 
          
          <a class="hero__socials-insta" href="#">
            <svg class="insta"
              width="24"
              height="24"
              aria-hidden="true"
              focusable="false">
              <use href="/__spritemap#sprite-insta"></use>
            </svg>
          </a>

          <a class="hero__socials-twitter" href="#">
            <svg class="twitter"
              width="24"
              height="24"
              aria-hidden="true"
              focusable="false">
              <use href="/__spritemap#sprite-twitter"></use>
            </svg>
          </a>

        </div>


        <div class="hero__scrollbar"></div>

        <div class="hero__text">
          <p class="badge">A hiking guide</p>
          <h2 class="hero__title">Be&nbsp;prepared for the mountains and beyond!</h2>
          <div class="scroll__down">
            <span>scroll down</span>
              <svg class="down"
              width="16"
              height="24"
              aria-hidden="true"
              focusable="false">
              <use href="/__spritemap#sprite-down"></use>
            </svg>

          </div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="level"></div>
      <div class="gear"></div>
      <div class="map-timing"></div>
    </div>

    <footer class="footer">
      <div class="footer__logo"></div>
      <div class="footer__motto"></div>
      <div class="footer__copyright"></div>
      <div class="footer__links"></div>
      <div class="footer__links"></div>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>

</html>
